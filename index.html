<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Garden Battle Royale - Deluxe Edition</title>
    <style>
        * {
            user-select: none;
            touch-action: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #0a2f1f;
            overflow: hidden;
        }

        .game-container {
            position: fixed;
            inset: 0;
            padding: 0;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            box-shadow: none;
        }

        .info-panel {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            z-index: 10;

            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 20px;

            font-size: 0.7rem;
        }

        .scores {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .player-badge {
            background: #00000077;
            border-radius: 32px;
            padding: 4px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        button {
            background: #f5bc70;
            border: none;
            font-weight: bold;
            border-radius: 40px;
            padding: 6px 20px;
            font-family: monospace;
            font-size: 1rem;
            color: #1e2a1c;
            box-shadow: 0 3px 0 #7a4a1e;
            transition: 0.05s linear;
            cursor: pointer;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4a1e;
        }

        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: 'Poppins', monospace;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }

        .winner-card {
            background: linear-gradient(135deg, #f5bc70, #e6a345);
            border-radius: 60px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,200,0.6);
            animation: bounceIn 0.5s ease;
        }

        .winner-card h1 {
            font-size: 3rem;
            margin: 0;
            color: #fff;
            text-shadow: 4px 4px 0 #7a4a1e;
        }

        .winner-card p {
            font-size: 2rem;
            margin: 20px 0;
            color: #2c1a0e;
            font-weight: bold;
        }

        .winner-card button {
            font-size: 1.5rem;
            padding: 12px 32px;
            background: #2c1a0e;
            color: #f5bc70;
            box-shadow: none;
            border: none;
            cursor: pointer;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 800px) {
            .player-badge { font-size: 0.7rem; padding: 2px 10px; }
            .info-panel { padding: 5px 12px; }
            .winner-card { padding: 20px 30px; }
            .winner-card h1 { font-size: 1.8rem; }
            .winner-card p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="info-panel">
            <div class="scores" id="scorePanel"></div>
            <button id="resetBtn">🔄 إعادة الضبط</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let CW = 1200, CH = 700;
        canvas.width = CW; canvas.height = CH;

        // جدران المتاهة
        const walls = [
            { x: 140, y: 90, w: 200, h: 28 },
            { x: 860, y: 110, w: 190, h: 28 },
            { x: 60, y: 280, w: 28, h: 200 },
            { x: 1112, y: 360, w: 28, h: 220 },
            { x: 450, y: 520, w: 180, h: 30 },
            { x: 620, y: 230, w: 30, h: 170 },
            { x: 920, y: 480, w: 150, h: 30 },
            { x: 180, y: 600, w: 220, h: 30 },
            { x: 40, y: 500, w: 170, h: 28 },
            { x: 520, y: 120, w: 110, h: 28 },
            { x: 350, y: 340, w: 130, h: 26 },
            { x: 750, y: 310, w: 26, h: 140 },
            { x: 950, y: 200, w: 100, h: 26 }
        ];

        let players = [];
        let cannons = [];
        let bullets = [];
        let stars = [];
        let hitEffects = [];
        let explosions = [];
        let gameWinner = null;
        
        const PLAYER_RADIUS = 26;
        const PLAYER_SPEED = 340;
        const CANNON_SIZE = 30;
        const CANNON_SPEED = 100;
        const BULLET_RADIUS = 10;
        const BULLET_SPEED = 460;
        const BULLET_LIFESPAN = 5.0;

        let spawnPoints = [
            { x: 90, y: CH - 150 },
            { x: CW - 90, y: CH - 150 },
            { x: 90, y: 150 },
            { x: CW - 90, y: 150 }
        ];
        
        function updateSpawnPoints() {
            spawnPoints[0] = { x: 90, y: CH - 150 };
            spawnPoints[1] = { x: CW - 90, y: CH - 150 };
            spawnPoints[2] = { x: 90, y: 150 };
            spawnPoints[3] = { x: CW - 90, y: 150 };
        }
        
        // إيموجيات ملونة جديدة
        const playerIcons = ['🔥', '❄️', '⚡', '🌿'];
        const playerNames = ['النار', 'الجليد', 'البرق', 'النبات'];
        const playerColors = [
            '#E34234', // النار - أحمر
            '#3498DB', // الجليد - أزرق
            '#F4C542', // البرق - أصفر
            '#2ECC71',  // النبات - أخضر
        ];
        
        function resolvePlayerCollision(p1, p2) {
            if(p1.health <= 0 || p2.health <= 0) return;
            let dx = p1.x - p2.x;
            let dy = p1.y - p2.y;
            let dist = Math.hypot(dx, dy);
            let minDist = PLAYER_RADIUS * 2;
            if(dist < minDist) {
                let angle = Math.atan2(dy, dx);
                let overlap = minDist - dist;
                let moveX = Math.cos(angle) * overlap * 0.5;
                let moveY = Math.sin(angle) * overlap * 0.5;
                p1.x += moveX;
                p1.y += moveY;
                p2.x -= moveX;
                p2.y -= moveY;
                
                p1.x = Math.min(Math.max(p1.x, PLAYER_RADIUS+3), CW-PLAYER_RADIUS-3);
                p1.y = Math.min(Math.max(p1.y, PLAYER_RADIUS+3), CH-PLAYER_RADIUS-3);
                p2.x = Math.min(Math.max(p2.x, PLAYER_RADIUS+3), CW-PLAYER_RADIUS-3);
                p2.y = Math.min(Math.max(p2.y, PLAYER_RADIUS+3), CH-PLAYER_RADIUS-3);
            }
        }
        
        function resolveCannonPlayerCollision(cannon, player) {
            if(player.health <= 0) return;
            let dx = cannon.x - player.x;
            let dy = cannon.y - player.y;
            let dist = Math.hypot(dx, dy);
            let minDist = CANNON_SIZE/2 + PLAYER_RADIUS;
            if(dist < minDist) {
                let angle = Math.atan2(dy, dx);
                let overlap = minDist - dist;
                let moveX = Math.cos(angle) * overlap;
                let moveY = Math.sin(angle) * overlap;
                cannon.x += moveX;
                cannon.y += moveY;
                cannon.x = Math.min(Math.max(cannon.x, CANNON_SIZE/2+10), CW-CANNON_SIZE/2-10);
                cannon.y = Math.min(Math.max(cannon.y, CANNON_SIZE/2+10), CH-CANNON_SIZE/2-10);
            }
        }
        
        function isLineOfSightBlocked(x1, y1, x2, y2) {
            for(let w of walls) {
                if (lineIntersectsRect(x1, y1, x2, y2, w)) return true;
            }
            return false;
        }
        
        function lineIntersectsRect(x1, y1, x2, y2, rect) {
            return (lineIntersectsLine(x1, y1, x2, y2, rect.x, rect.y, rect.x+rect.w, rect.y) ||
                    lineIntersectsLine(x1, y1, x2, y2, rect.x+rect.w, rect.y, rect.x+rect.w, rect.y+rect.h) ||
                    lineIntersectsLine(x1, y1, x2, y2, rect.x+rect.w, rect.y+rect.h, rect.x, rect.y+rect.h) ||
                    lineIntersectsLine(x1, y1, x2, y2, rect.x, rect.y+rect.h, rect.x, rect.y) ||
                    (pointInRect(x1, y1, rect) && pointInRect(x2, y2, rect)));
        }
        
        function lineIntersectsLine(x1, y1, x2, y2, x3, y3, x4, y4) {
            let ua = ((x4-x3)*(y1-y3) - (y4-y3)*(x1-x3)) / ((y4-y3)*(x2-x1) - (x4-x3)*(y2-y1));
            let ub = ((x2-x1)*(y1-y3) - (y2-y1)*(x1-x3)) / ((y4-y3)*(x2-x1) - (x4-x3)*(y2-y1));
            return (ua >= 0 && ua <= 1 && ub >= 0 && ub <= 1);
        }
        
        function pointInRect(px, py, rect) {
            return px >= rect.x && px <= rect.x+rect.w && py >= rect.y && py <= rect.y+rect.h;
        }
        
        function getAvoidanceDirection(cannonX, cannonY, targetX, targetY, speed) {
            let bestX = targetX, bestY = targetY;
            let minDist = Infinity;
            let offsets = [[0, 0], [40, 0], [-40, 0], [0, 40], [0, -40], [60, 60], [-60, 60], [60, -60], [-60, -60]];
            for(let off of offsets) {
                let testX = targetX + off[0];
                let testY = targetY + off[1];
                if(!isLineOfSightBlocked(cannonX, cannonY, testX, testY)) {
                    let dist = Math.hypot(testX - cannonX, testY - cannonY);
                    if(dist < minDist) {
                        minDist = dist;
                        bestX = testX;
                        bestY = testY;
                    }
                }
            }
            let dx = bestX - cannonX;
            let dy = bestY - cannonY;
            let len = Math.hypot(dx, dy);
            if(len > 0.01) { dx = dx / len * speed; dy = dy / len * speed; }
            return { dx, dy };
        }
        
        function isCollidingWithWall(x, y, size) {
            const half = size/2;
            for(let w of walls) {
                if(x+half > w.x && x-half < w.x+w.w && y+half > w.y && y-half < w.y+w.h) return true;
            }
            return false;
        }
        
        function moveWithWallCollision(entity, radius, testX, testY) {
            let newX = testX, newY = testY;
            let hitHor = false;
            for(let w of walls) {
                if(newX+radius > w.x && newX-radius < w.x+w.w && newY+radius > w.y && newY-radius < w.y+w.h) { hitHor = true; break; }
            }
            if(hitHor) newX = entity.x;
            let hitVer = false;
            for(let w of walls) {
                if(newX+radius > w.x && newX-radius < w.x+w.w && newY+radius > w.y && newY-radius < w.y+w.h) { hitVer = true; break; }
            }
            if(hitVer) newY = entity.y;
            for(let w of walls) {
                if(newX+radius > w.x && newX-radius < w.x+w.w && newY+radius > w.y && newY-radius < w.y+w.h) {
                    let dx = newX - (w.x+w.w/2);
                    let dy = newY - (w.y+w.h/2);
                    let overlapX = (radius + w.w/2) - Math.abs(dx);
                    let overlapY = (radius + w.h/2) - Math.abs(dy);
                    if(overlapX > 0 && overlapY > 0) {
                        if(overlapX < overlapY) newX += (dx > 0 ? overlapX : -overlapX);
                        else newY += (dy > 0 ? overlapY : -overlapY);
                    }
                    break;
                }
            }
            entity.x = Math.min(Math.max(newX, radius+3), CW-radius-3);
            entity.y = Math.min(Math.max(newY, radius+3), CH-radius-3);
        }
        
        function addExplosion(x, y) { explosions.push({ x: x, y: y, timer: 0.6, size: 20 }); playSound('explosion'); }
        function updateExplosions(delta) { for(let i=0;i<explosions.length;i++){ explosions[i].timer -= delta; if(explosions[i].timer <= 0){ explosions.splice(i,1); i--; } } }
        function drawExplosions() { for(let exp of explosions){ let alpha = Math.min(1, exp.timer * 2); let size = exp.size + (1 - exp.timer/0.6) * 40; ctx.beginPath(); ctx.arc(exp.x, exp.y, size, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 80, 30, ${alpha*0.9})`; ctx.fill(); ctx.beginPath(); ctx.arc(exp.x, exp.y, size*0.6, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 200, 50, ${alpha*0.8})`; ctx.fill(); ctx.beginPath(); ctx.arc(exp.x, exp.y, size*0.3, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 255, 180, 1)`; ctx.fill(); } }
        
        function initPlayers() {
            players = [];
            for(let i=0;i<4;i++){
                players.push({
                    id: i, x: spawnPoints[i].x, y: spawnPoints[i].y, health: 4, score: 0,
                    shieldActive: false, shieldTimer: 0, invincibleTimer: 0, color: playerColors[i], 
                    icon: playerIcons[i], name: playerNames[i], hitFlash: 0
                });
            }
        }
        
        function checkWinner() {
            if(gameWinner) return gameWinner;
            const alivePlayers = players.filter(p => p.health > 0);
            if(alivePlayers.length === 1 && players.length > 0) {
                gameWinner = alivePlayers[0];
                playSound('victory');
                return gameWinner;
            }
            return null;
        }
        
        class SmartCannon {
            constructor(ownerId, targetPlayerId, startX, startY) {
                this.ownerId = ownerId; this.targetId = targetPlayerId; this.x = startX; this.y = startY; this.cooldown = 0; this.stuckCounter = 0;
            }
            update(delta, playersList) {
                if(gameWinner) return;
                let target = playersList.find(p => p.id === this.targetId && p.health > 0);
                if(!target) { let alive = playersList.filter(p => p.health>0 && p.id !== this.ownerId); if(alive.length) this.targetId = alive[0].id; else return; target = playersList.find(p => p.id === this.targetId); }
                if(!target) return;
                let avoidance = getAvoidanceDirection(this.x, this.y, target.x, target.y, CANNON_SPEED * delta);
                let newX = this.x + avoidance.dx, newY = this.y + avoidance.dy;
                if(!isCollidingWithWall(newX, newY, CANNON_SIZE)) { this.x = newX; this.y = newY; this.stuckCounter = 0; }
                else {
                    this.stuckCounter++;
                    let angle = Math.atan2(target.y - this.y, target.x - this.x);
                    let testAngles = [0.5, -0.5, 1, -1, 1.5, -1.5];
                    let moved = false;
                    for(let addAngle of testAngles) {
                        let newAngle = angle + addAngle;
                        let testX = this.x + Math.cos(newAngle) * CANNON_SPEED * delta;
                        let testY = this.y + Math.sin(newAngle) * CANNON_SPEED * delta;
                        if(!isCollidingWithWall(testX, testY, CANNON_SIZE)) { this.x = testX; this.y = testY; moved = true; break; }
                    }
                    if(!moved && this.stuckCounter > 10) { let randomAngle = Math.random() * Math.PI * 2; this.x += Math.cos(randomAngle) * 30; this.y += Math.sin(randomAngle) * 30; this.stuckCounter = 0; }
                }
                this.x = Math.min(Math.max(this.x, CANNON_SIZE/2+10), CW-CANNON_SIZE/2-10);
                this.y = Math.min(Math.max(this.y, CANNON_SIZE/2+10), CH-CANNON_SIZE/2-10);
                if(this.cooldown > 0) this.cooldown -= delta;
                if(target && this.cooldown <= 0) {
                    let angle = Math.atan2(target.y - this.y, target.x - this.x);
                    bullets.push({ x: this.x, y: this.y, vx: Math.cos(angle)*BULLET_SPEED, vy: Math.sin(angle)*BULLET_SPEED, life: BULLET_LIFESPAN, radius: BULLET_RADIUS, shooterId: this.ownerId });
                    this.cooldown = 0.95;
                    playSound('shoot');
                }
            }
            draw(ctx) {
                ctx.save(); ctx.shadowBlur = 5;
                ctx.fillStyle = '#6b4c3b'; ctx.fillRect(this.x-CANNON_SIZE/2, this.y-CANNON_SIZE/2, CANNON_SIZE, CANNON_SIZE);
                ctx.fillStyle = '#8b5e3c'; ctx.fillRect(this.x-CANNON_SIZE/2+3, this.y-CANNON_SIZE/2+3, CANNON_SIZE-6, CANNON_SIZE-6);
                let target = players.find(p=>p.id === this.targetId && p.health>0);
                if(target){
                    let angle = Math.atan2(target.y - this.y, target.x - this.x);
                    let barrelX = this.x + Math.cos(angle) * 20, barrelY = this.y + Math.sin(angle) * 20;
                    ctx.fillStyle = '#aa7645'; ctx.save(); ctx.translate(barrelX, barrelY); ctx.rotate(angle); ctx.fillRect(-7, -7, 26, 14); ctx.restore();
                }
                ctx.fillStyle = '#dd9944'; ctx.beginPath(); ctx.arc(this.x, this.y, 9, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }
        
        function initCannons() {
            cannons = [];
            let centerX = CW/2, centerY = CH/2, radius = 110;
            let angles = [45, 135, 225, 315].map(a => a * Math.PI/180);
            for(let i=0;i<4;i++){ let x = centerX + Math.cos(angles[i]) * radius; let y = centerY + Math.sin(angles[i]) * radius; cannons.push(new SmartCannon(i, (i+1)%4, x, y)); }
        }
        
        function updateCannons(delta) {
            if(gameWinner) return;
            for(let c of cannons) {
                let targetExist = players.find(p=> p.id === c.targetId && p.health>0);
                if(!targetExist) { let aliveTargets = players.filter(p=> p.health>0 && p.id !== c.ownerId); if(aliveTargets.length) c.targetId = aliveTargets[0].id; }
                c.update(delta, players);
                for(let p of players) resolveCannonPlayerCollision(c, p);
            }
        }
        
        function addHitEffect(x, y) { hitEffects.push({ x: x, y: y, timer: 0.4 }); }
        function updateHitEffects(delta) { for(let i=0;i<hitEffects.length;i++){ hitEffects[i].timer -= delta; if(hitEffects[i].timer <= 0){ hitEffects.splice(i,1); i--; } } }
        function drawHitEffects() { for(let eff of hitEffects){ let alpha = Math.min(1, eff.timer * 2.5); ctx.beginPath(); ctx.arc(eff.x, eff.y, 20, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 80, 40, ${alpha*0.8})`; ctx.fill(); ctx.beginPath(); ctx.arc(eff.x, eff.y, 32, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 200, 60, ${alpha*0.5})`; ctx.fill(); } }
        
        function updateBullets(delta) {
            if(gameWinner) return;
            for(let i=0;i<bullets.length;i++){
                let b = bullets[i]; b.life -= delta;
                if(b.life <= 0){ bullets.splice(i,1); i--; continue; }
                let newX = b.x + b.vx*delta, newY = b.y + b.vy*delta;
                if(newX - BULLET_RADIUS <= 0){ newX = BULLET_RADIUS; b.vx = -b.vx; playSound('bounce');}
                if(newX + BULLET_RADIUS >= CW){ newX = CW - BULLET_RADIUS; b.vx = -b.vx; playSound('bounce');}
                if(newY - BULLET_RADIUS <= 0){ newY = BULLET_RADIUS; b.vy = -b.vy; playSound('bounce');}
                if(newY + BULLET_RADIUS >= CH){ newY = CH - BULLET_RADIUS; b.vy = -b.vy; playSound('bounce');}
                for(let w of walls){
                    let bulletRect = {x: newX-BULLET_RADIUS, y: newY-BULLET_RADIUS, w: BULLET_RADIUS*2, h: BULLET_RADIUS*2};
                    if(!(bulletRect.x > w.x+w.w || bulletRect.x+bulletRect.w < w.x || bulletRect.y > w.y+w.h || bulletRect.y+bulletRect.h < w.y)){
                        let overlapL = (newX+BULLET_RADIUS)-w.x, overlapR = (w.x+w.w)-(newX-BULLET_RADIUS), overlapT = (newY+BULLET_RADIUS)-w.y, overlapB = (w.y+w.h)-(newY-BULLET_RADIUS);
                        if(Math.min(overlapL,overlapR) < Math.min(overlapT,overlapB)) b.vx = -b.vx; else b.vy = -b.vy;
                        newX = b.x; newY = b.y; playSound('bounce'); break;
                    }
                }
                b.x = newX; b.y = newY;
                for(let p of players){
                    if(p.health>0 && p.invincibleTimer <=0 && !p.shieldActive && Math.hypot(b.x-p.x, b.y-p.y) < PLAYER_RADIUS + BULLET_RADIUS){
                        p.health -= 1; p.hitFlash = 0.25; addHitEffect(p.x, p.y); playSound('hit');
                        bullets.splice(i,1); i--;
                        if(p.health <= 0){ 
                            playSound('defeat'); // صوت الخسارة
                            playSound('death'); 
                            addExplosion(p.x, p.y); 
                            let shooter = players.find(pl=> pl.id === b.shooterId); 
                            if(shooter && shooter.health>0){ shooter.score += 1; updateUI(); } 
                        }
                        else { p.invincibleTimer = 0.65; }
                        break;
                    } else if(p.shieldActive && p.health>0 && Math.hypot(b.x-p.x, b.y-p.y) < PLAYER_RADIUS + BULLET_RADIUS){ bullets.splice(i,1); playSound('shieldBlock'); i--; break; }
                }
            }
        }
        
        function spawnStar() { if(stars.length < 6 && Math.random()<0.018 && !gameWinner) stars.push({ x: 50 + Math.random()*(CW-100), y: 50 + Math.random()*(CH-100), r: 14 }); }
        function updateStars() { if(gameWinner) return; for(let i=0;i<stars.length;i++){ let s = stars[i]; for(let p of players){ if(p.health>0 && Math.hypot(p.x-s.x, p.y-s.y) < PLAYER_RADIUS + s.r){ stars.splice(i,1); p.score += 1; p.health = Math.min(4, p.health+1); playSound('collect'); updateUI(); i--; break; } } } spawnStar(); }
        
          let joysticks = [
            { cx: 120, cy: CH-120, active:false, dirX:0, dirY:0, radius:75, color: playerColors[0], touchId:null, stickX:120, stickY:CH-120 },
            { cx: CW-120, cy: CH-120, active:false, dirX:0, dirY:0, radius:75, color: playerColors[1], touchId:null, stickX:CW-120, stickY:CH-120 },
            { cx: 120, cy: 120, active:false, dirX:0, dirY:0, radius:75, color: playerColors[2], touchId:null, stickX:120, stickY:120 },
            { cx: CW-120, cy: 120, active:false, dirX:0, dirY:0, radius:75, color: playerColors[3], touchId:null, stickX:CW-120, stickY:120 }
            ];
        
        let keyboardState = { w:false,s:false,a:false,d:false, i:false,k:false,j:false,l:false, up:false,down:false,left:false,right:false, t:false,g:false,f:false,h:false };
        
        function updateMovement(delta){
            if(gameWinner) return;
            for(let i=0;i<players.length;i++){
                let p = players[i];
                if(p.health<=0) continue;
                let joy = joysticks[i];
                let moveX = 0, moveY = 0;
                if(joy.active && (joy.dirX !== 0 || joy.dirY !== 0)){
                    moveX = joy.dirX;
                    moveY = joy.dirY;
                } else {
                    if(i===0){ if(keyboardState.w) moveY-=1; if(keyboardState.s) moveY+=1; if(keyboardState.a) moveX-=1; if(keyboardState.d) moveX+=1;}
                    if(i===1){ if(keyboardState.i) moveY-=1; if(keyboardState.k) moveY+=1; if(keyboardState.j) moveX-=1; if(keyboardState.l) moveX+=1;}
                    if(i===2){ if(keyboardState.up) moveY-=1; if(keyboardState.down) moveY+=1; if(keyboardState.left) moveX-=1; if(keyboardState.right) moveX+=1;}
                    if(i===3){ if(keyboardState.t) moveY-=1; if(keyboardState.g) moveY+=1; if(keyboardState.f) moveX-=1; if(keyboardState.h) moveX+=1;}
                }
                if(moveX !==0 || moveY !==0){
                    let len = Math.hypot(moveX,moveY);
                    moveX = moveX/len * PLAYER_SPEED * delta;
                    moveY = moveY/len * PLAYER_SPEED * delta;
                    moveWithWallCollision(p, PLAYER_RADIUS, p.x+moveX, p.y+moveY);
                }
                if(p.shieldTimer>0){ p.shieldTimer -= delta; if(p.shieldTimer<=0) p.shieldActive=false; }
                if(p.invincibleTimer>0) p.invincibleTimer -= delta;
                if(p.hitFlash>0) p.hitFlash -= delta;
            }
            for(let i=0;i<players.length;i++) for(let j=i+1;j<players.length;j++) resolvePlayerCollision(players[i], players[j]);
        }
        
        function activateShield(playerId){ let p = players[playerId]; if(p && p.health>0 && p.shieldTimer<=0 && p.invincibleTimer<=0 && !gameWinner){ p.shieldActive = true; p.shieldTimer = 1.4; playSound('shield'); } }
        function handleTouchStart(e) {
          e.preventDefault();

          const rect = canvas.getBoundingClientRect();
          const scaleX = CW / rect.width;
          const scaleY = CH / rect.height;

          for (let touch of e.changedTouches) {
              const tx = (touch.clientX - rect.left) * scaleX;
              const ty = (touch.clientY - rect.top) * scaleY;

              // لكل لاعب، تحقق إذا كانت اللمسة داخل عصاه
              for (let i = 0; i < joysticks.length; i++) {
                  let joy = joysticks[i];
                  if (!joy.active) {
                      let dx = tx - joy.cx;
                      let dy = ty - joy.cy;
                      if (Math.hypot(dx, dy) <= joy.radius) {
                          joy.active = true;
                          joy.touchId = touch.identifier;
                          joy.stickX = tx;
                          joy.stickY = ty;

                          // **تفعيل الدرع مباشرة عند اللمس**
                          activateShield(i);
                      }
                  }
              }
          }
}
        
        
        function handleTouchMove(e){
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let scaleX = CW / rect.width;
            let scaleY = CH / rect.height;
            for(let i=0; i<e.touches.length; i++){
                let touch = e.touches[i];
                let tx = (touch.clientX - rect.left) * scaleX;
                let ty = (touch.clientY - rect.top) * scaleY;
                let touchId = touch.identifier;
                for(let idx=0; idx<joysticks.length; idx++){
                    let j = joysticks[idx];
                    if(j.touchId === touchId){
                        let dx = tx - j.cx;
                        let dy = ty - j.cy;
                        let dist = Math.min(j.radius, Math.hypot(dx, dy));
                        if(dist > 5){
                            let angle = Math.atan2(dy, dx);
                            j.stickX = j.cx + Math.cos(angle) * dist;
                            j.stickY = j.cy + Math.sin(angle) * dist;
                            j.dirX = dx / Math.hypot(dx, dy);
                            j.dirY = dy / Math.hypot(dx, dy);
                        } else {
                            j.stickX = j.cx;
                            j.stickY = j.cy;
                            j.dirX = 0; j.dirY = 0;
                        }
                        break;
                    }
                }
            }
        }
        
        function handleTouchEnd(e){
            e.preventDefault();
            let remainingTouches = [];
            for(let i=0; i<e.touches.length; i++) remainingTouches.push(e.touches[i].identifier);
            for(let j of joysticks){
                if(j.touchId !== null && !remainingTouches.includes(j.touchId)){
                    j.active = false;
                    j.dirX = 0; j.dirY = 0;
                    j.stickX = j.cx;
                    j.stickY = j.cy;
                    j.touchId = null;
                }
            }
        }
        
        function updateUI(){
            let html = '';
            for(let p of players){
                let hearts = '❤️'.repeat(p.health)+'🖤'.repeat(4-p.health);
                html += `<div class="player-badge" style="border-left: 6px solid ${p.color}">${p.icon} ${p.name} ${p.score} 🏆 ${hearts} ${p.shieldActive?'🛡️':''}</div>`;
            }
            document.getElementById('scorePanel').innerHTML = html;
        }
        
        function drawGardenBackground() {
            let grad = ctx.createLinearGradient(0, 0, 0, CH);
            grad.addColorStop(0, '#6b9e4a'); grad.addColorStop(1, '#3d6b2a');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, CW, CH);
            for(let i=0;i<60;i++){ ctx.fillStyle = `rgba(255, 230, 140, 0.3)`; ctx.beginPath(); ctx.arc( (i*157)%CW, (i*83)%CH, 4, 0, Math.PI*2); ctx.fill(); }
            for(let t=0;t<15;t++){ let treeX = 40 + (t*97)%(CW-80), treeY = 25 + (t*61)%(CH-120); ctx.fillStyle = '#7a5a3a'; ctx.fillRect(treeX-6, treeY+12, 12, 28); ctx.fillStyle = '#5d8c48'; ctx.beginPath(); ctx.arc(treeX, treeY, 18, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#7aa84f'; ctx.beginPath(); ctx.arc(treeX-4, treeY-5, 12, 0, Math.PI*2); ctx.fill(); }
        }
        
        function draw() {
            drawGardenBackground();
            for(let w of walls){ ctx.fillStyle = '#8b6946'; ctx.shadowBlur = 5; ctx.fillRect(w.x,w.y,w.w,w.h); ctx.fillStyle = '#b88d5a'; ctx.fillRect(w.x+4,w.y+4,w.w-8,w.h-8); }
            ctx.shadowBlur = 0;
            for(let s of stars){ ctx.fillStyle = '#FFD966'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r-2,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#F9E076'; ctx.beginPath(); ctx.arc(s.x-2,s.y-2,5,0,Math.PI*2); ctx.fill(); }
            for(let b of bullets){ ctx.fillStyle = '#ff8844'; ctx.shadowBlur = 6; ctx.beginPath(); ctx.arc(b.x,b.y,BULLET_RADIUS-2,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#ffbb77'; ctx.beginPath(); ctx.arc(b.x,b.y,BULLET_RADIUS-4,0,Math.PI*2); ctx.fill(); }
            ctx.shadowBlur = 0;
            for(let c of cannons) c.draw(ctx);
            for(let p of players){
                if(p.health <= 0) continue;
                ctx.shadowBlur = p.shieldActive? 18:4;
                ctx.shadowColor = p.shieldActive? '#b6ffda':'black';
                if(p.hitFlash > 0) ctx.fillStyle = '#ffffff';
                else ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.roundRect(p.x-PLAYER_RADIUS, p.y-PLAYER_RADIUS, PLAYER_RADIUS*2, PLAYER_RADIUS*2, 10); ctx.fill();
                if(p.shieldActive){ ctx.strokeStyle = '#e0ffc0'; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(p.x,p.y,PLAYER_RADIUS+5,0,Math.PI*2); ctx.stroke(); }
                ctx.fillStyle = 'white'; ctx.font = 'bold 34px monospace'; ctx.shadowBlur = 3;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(p.icon, p.x, p.y);
                ctx.textAlign = 'left';
            }
            drawHitEffects(); drawExplosions();
            for(let i=0;i<joysticks.length;i++){
                let j = joysticks[i];
                ctx.globalAlpha = 0.55;
                ctx.fillStyle = j.color;
                ctx.beginPath(); ctx.arc(j.cx, j.cy, j.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.stroke();
                ctx.fillStyle = '#ffffffdd';
                ctx.beginPath(); ctx.arc(j.stickX, j.stickY, 24, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#aaaaaaff';
                ctx.beginPath(); ctx.arc(j.stickX, j.stickY, 16, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y); this.lineTo(x+w-r, y); this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h); this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r); this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        let audioCtx = null, lastSoundTime = 0;
        function initAudio(){ if(!audioCtx && window.AudioContext) audioCtx = new AudioContext(); }
        function playSound(type){
            if(!audioCtx) initAudio(); if(!audioCtx) return;
            let now = Date.now();
            if(now - lastSoundTime < 20 && (type === 'bounce' || type === 'hit')) return;
            lastSoundTime = now;
            try{
                let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                let startTime = audioCtx.currentTime;
                if(type==='shoot'){ osc.frequency.value = 520; gain.gain.setValueAtTime(0.08, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime+0.18); osc.start(); osc.stop(startTime+0.18); }
                else if(type==='hit'){ osc.frequency.value = 280; gain.gain.setValueAtTime(0.1, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime+0.2); osc.start(); osc.stop(startTime+0.2); }
                else if(type==='collect'){ osc.frequency.value = 880; gain.gain.setValueAtTime(0.1, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime+0.12); osc.start(); osc.stop(startTime+0.12); }
                else if(type==='shield'){ osc.frequency.value = 440; gain.gain.setValueAtTime(0.12, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime+0.22); osc.start(); osc.stop(startTime+0.22); }
                else if(type==='shieldBlock'){ osc.frequency.value = 380; gain.gain.setValueAtTime(0.1, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime+0.15); osc.start(); osc.stop(startTime+0.15); }
                else if(type==='bounce'){ osc.frequency.value = 450; gain.gain.setValueAtTime(0.05, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime+0.08); osc.start(); osc.stop(startTime+0.08); }
                else if(type==='death'){ osc.frequency.value = 160; gain.gain.setValueAtTime(0.15, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime+0.4); osc.start(); osc.stop(startTime+0.4); }
                else if(type==='defeat'){ osc.frequency.value = 100; gain.gain.setValueAtTime(0.2, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime+0.35); osc.start(); osc.stop(startTime+0.35); }
                else if(type==='victory'){ 
                    for(let i=0;i<3;i++){
                        let osc2 = audioCtx.createOscillator();
                        let gain2 = audioCtx.createGain();
                        osc2.connect(gain2); gain2.connect(audioCtx.destination);
                        osc2.frequency.value = 660 + i*110;
                        gain2.gain.setValueAtTime(0.15, startTime + i*0.1);
                        gain2.gain.exponentialRampToValueAtTime(0.0001, startTime + i*0.1 + 0.3);
                        osc2.start(startTime + i*0.1); osc2.stop(startTime + i*0.1 + 0.3);
                    }
                }
                else if(type==='explosion'){
                  let bufferSize = audioCtx.sampleRate * 0.5;
                  let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                  let data = buffer.getChannelData(0);

                  for (let i = 0; i < bufferSize; i++) {
                      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize / 5));
                  }

                  let noise = audioCtx.createBufferSource();
                  noise.buffer = buffer;

                  let gainNode = audioCtx.createGain();
                  gainNode.gain.setValueAtTime(0.5, startTime);
                  gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);

                  noise.connect(gainNode);
                  gainNode.connect(audioCtx.destination);

                  noise.start(startTime);
              }
            } catch(e){}
        }
        
        function resetGame(){ 
          bullets = []; stars = []; hitEffects = []; explosions = []; 
          gameWinner = null;

          initPlayers();        // ← أولاً أنشئ اللاعبين
          initCannons();        

          syncJoystickColors(); // ← ثم اربط الألوان

          updateUI(); 
          playSound('collect'); 

          const overlay = document.querySelector('.winner-overlay');
          if(overlay) overlay.remove();
          for (let j of joysticks) {
            j.active = false;
            j.touchId = null;
            j.dirX = 0;
            j.dirY = 0;
            j.stickX = j.cx;
            j.stickY = j.cy;
            updateSpawnPoints();
        }
      }
        
        function showWinnerScreen(winner) {
            if(!winner) return;
            const overlay = document.createElement('div');
            overlay.className = 'winner-overlay';
            overlay.innerHTML = `
                <div class="winner-card">
                    <h1>🏆 فوز! 🏆</h1>
                    <p>${winner.icon} ${winner.name} هو الفائز!</p>
                    <button id="playAgainBtn">العب مرة أخرى</button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('playAgainBtn').onclick = () => {
                overlay.remove();
                resetGame();
            };
        }
        
        window.addEventListener('keydown', (e)=>{
            let k = e.code;
            if(k==='Space'){ e.preventDefault(); activateShield(0);} if(k==='KeyM'){ e.preventDefault(); activateShield(1);}
            if(k==='KeyN'){ e.preventDefault(); activateShield(2);} if(k==='KeyB'){ e.preventDefault(); activateShield(3);}
            const map = {'KeyW':'w','KeyS':'s','KeyA':'a','KeyD':'d','KeyI':'i','KeyK':'k','KeyJ':'j','KeyL':'l','ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right','KeyT':'t','KeyG':'g','KeyF':'f','KeyH':'h'};
            if(map[k]) keyboardState[map[k]]=true;
        });
        window.addEventListener('keyup', (e)=>{ const map = {'KeyW':'w','KeyS':'s','KeyA':'a','KeyD':'d','KeyI':'i','KeyK':'k','KeyJ':'j','KeyL':'l','ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right','KeyT':'t','KeyG':'g','KeyF':'f','KeyH':'h'}; if(map[e.code]) keyboardState[map[e.code]]=false; });
        
        canvas.addEventListener('touchstart', handleTouchStart);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchend', handleTouchEnd);
        canvas.addEventListener('touchcancel', handleTouchEnd);
        canvas.addEventListener('click', ()=>{ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); });
        document.getElementById('resetBtn').onclick = ()=> resetGame();
        
        let lastTimestamp = 0;
        function gameLoop(now){
            let delta = Math.min(0.033, (now-lastTimestamp)/1000);
            if(delta>0){
                updateMovement(delta);
                updateBullets(delta);
                updateCannons(delta);
                updateStars();
                updateHitEffects(delta);
                updateExplosions(delta);
                draw();
                updateUI();
                const winner = checkWinner();
                if(winner && !document.querySelector('.winner-overlay')) {
                    showWinnerScreen(winner);
                }
            }
            lastTimestamp = now;
            requestAnimationFrame(gameLoop);
        }
        
        initPlayers();
        initCannons();
        updateUI();
        lastTimestamp = performance.now();
        requestAnimationFrame(gameLoop);
        setInterval(()=> spawnStar(), 4000);

        
    
        function syncJoystickColors() {
    for (let i = 0; i < joysticks.length; i++) {
        joysticks[i].color = players[i].color;
    }
}

        function resizeCanvas() {
        const ratio = window.devicePixelRatio || 1;

        CW = window.innerWidth;
        CH = window.innerHeight;

        canvas.width = CW * ratio;
        canvas.height = CH * ratio;

        canvas.style.width = CW + "px";
        canvas.style.height = CH + "px";

        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

        // ⚠️ مهم: تحديث نقاط السبون
        updateSpawnPoints();

        // تحديث الجويستيك
        joysticks[0].cx = 90;
        joysticks[0].cy = CH - 90;

        joysticks[1].cx = CW - 90;
        joysticks[1].cy = CH - 90;

        joysticks[2].cx = 90;
        joysticks[2].cy = 90;

        joysticks[3].cx = CW - 90;
        joysticks[3].cy = 90;
    }

    // تشغيل الريسايز
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    })();
</script>
